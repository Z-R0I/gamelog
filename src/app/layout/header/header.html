<header
  class="fixed top-0 left-0 right-0 border-b border-border bg-background/80 backdrop-blur-sm z-50"
>
  <nav class="container mx-auto px-4 h-16 flex items-center justify-between">
    <a
      routerLink="/"
      class="text-xl font-bold bg-gradient-to-r from-violet-400 to-fuchsia-500 bg-clip-text text-transparent"
    >
      Gamelog
    </a>
    <ul class="flex items-center gap-2 text-sm">
      <li>
        <a
          routerLink="/"
          routerLinkActive="!text-white !bg-white/10"
          ariaCurrentWhenActive="page"
          [routerLinkActiveOptions]="{ exact: true }"
          class="px-3 py-2 rounded-md font-medium text-zinc-400 hover:text-white hover:bg-white/5 transition-colors"
        >
          Home
        </a>
      </li>
      <li>
        <a
          routerLink="/search"
          routerLinkActive="!text-white !bg-white/10"
          ariaCurrentWhenActive="page"
          class="px-3 py-2 rounded-md font-medium text-zinc-400 hover:text-white hover:bg-white/5 transition-colors"
        >
          Buscar
        </a>
      </li>
      <li>
        <a
          routerLink="/favorites"
          routerLinkActive="!text-white !bg-white/10"
          ariaCurrentWhenActive="page"
          class="px-3 py-2 rounded-md font-medium text-zinc-400 hover:text-white hover:bg-white/5 transition-colors"
        >
          Favoritos
        </a>
      </li>
    </ul>
  </nav>
</header>
