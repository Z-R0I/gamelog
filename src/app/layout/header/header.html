<header class="border-b border-border bg-background/80 backdrop-blur-sm sticky top-0 z-50">
  <nav class="container mx-auto px-4 h-16 flex items-center justify-between">
    <a routerLink="/" class="text-xl font-bold bg-gradient-to-r from-violet-400 to-fuchsia-500 bg-clip-text text-transparent">
      Gamelog
    </a>
    <ul class="flex items-center gap-6 text-sm">
      <li>
        <a
          routerLink="/"
          routerLinkActive="text-foreground"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-muted-foreground hover:text-foreground transition-colors"
        >
          Home
        </a>
      </li>
      <li>
        <a
          routerLink="/search"
          routerLinkActive="text-foreground"
          class="text-muted-foreground hover:text-foreground transition-colors"
        >
          Buscar
        </a>
      </li>
      <li>
        <a
          routerLink="/favorites"
          routerLinkActive="text-foreground"
          class="text-muted-foreground hover:text-foreground transition-colors"
        >
          Favoritos
        </a>
      </li>
    </ul>
  </nav>
</header>
