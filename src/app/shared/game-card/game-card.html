<article
  class="group relative bg-zinc-900/80 rounded-md overflow-hidden border transition-all duration-300 flex flex-col cursor-pointer"
  [class]="cardClasses()"
>
  <div class="relative aspect-[460/215] overflow-hidden bg-zinc-800">
    @if (game().backgroundImage) {
      <img
        [src]="game().backgroundImage"
        [alt]="game().name"
        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
      />
    }

    <div
      class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-60 group-hover:opacity-40 transition-opacity"
    ></div>

    <button
      type="button"
      (click)="toggleFavorite($event)"
      [attr.aria-label]="isFavorite() ? 'Remove from favorites' : 'Add to favorites'"
      [attr.aria-pressed]="isFavorite()"
      class="absolute top-2 left-2 p-1.5 rounded-md bg-black/60 backdrop-blur-sm border border-white/10 hover:bg-black/80 hover:scale-110 transition-all duration-200 cursor-pointer"
      [class.border-amber-400]="isFavorite()"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        class="w-5 h-5 transition-colors duration-200"
        [class]="starClasses()"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polygon
          points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
        />
      </svg>
    </button>

    @if (game().metacritic) {
      <div
        class="absolute top-2 right-2 flex items-center gap-1 bg-black/80 backdrop-blur-sm border border-green-500/50 text-green-400 font-bold text-xs px-2 py-1 rounded"
      >
        <span class="text-[10px] uppercase tracking-wider text-green-500/70">MC</span>
        {{ game().metacritic }}
      </div>
    }

    <h3
      class="absolute bottom-2 left-3 right-3 font-semibold text-white text-base line-clamp-1 drop-shadow-lg"
    >
      {{ game().name }}
    </h3>
  </div>

  <div class="p-3 space-y-2 flex-1 flex flex-col bg-zinc-900/60">
    <div class="flex items-center gap-3 text-xs text-zinc-400">
      <span class="flex items-center gap-1">
        <span class="text-yellow-400">★</span>
        <span class="text-zinc-200 font-medium">{{ game().rating }}</span>
      </span>
      @if (game().released) {
        <span class="text-zinc-500">·</span>
        <span>{{ game().released }}</span>
      }
      @if (game().playtime) {
        <span class="text-zinc-500">·</span>
        <span>{{ game().playtime }}h</span>
      }
    </div>

    <div class="flex flex-wrap gap-1 mt-auto">
      @for (g of game().genres; track g.id) {
        <span
          class="text-[10px] uppercase tracking-wider px-2 py-0.5 rounded bg-zinc-800 text-zinc-300 border border-zinc-700"
        >
          {{ g.name }}
        </span>
      }
    </div>
  </div>
</article>
