<section class="container mx-auto px-4 py-12">
  <div class="text-center space-y-4">
    <h1
      class="text-5xl font-bold bg-gradient-to-r from-violet-400 to-fuchsia-500 bg-clip-text text-transparent pb-2 leading-tight"
    >
      Gamelog
    </h1>
    <p class="text-muted-foreground text-lg">
      Descubre, busca y guarda tus juegos favoritos.
    </p>
    @for (game of games(); track game.id) {
      <div>
        <h3>{{ game.name }}</h3>
        <img [src]="game.backgroundImage" [alt]="game.name" />
      </div>
    } @empty {
      <p>No hay juegos</p>
    }
  </div>
</section>
